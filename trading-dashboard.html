<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trade·Desk</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-0:#080b0f; --bg-1:#0d1117; --bg-2:#161b22; --bg-3:#21262d; --bg-4:#30363d;
    --text-1:#e6edf3; --text-2:#8b949e; --text-3:#484f58;
    --accent:#1f6feb; --accent-glow:rgba(31,111,235,0.15);
    --green:#3fb950; --green-bg:rgba(63,185,80,0.1);
    --red:#f85149; --red-bg:rgba(248,81,73,0.1);
    --amber:#d29922; --amber-bg:rgba(210,153,34,0.1);
    --border:rgba(255,255,255,0.06);
    --font-mono:'JetBrains Mono',monospace;
    --font-sans:'Inter',sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg-0); color:var(--text-1); font-family:var(--font-sans); height:100vh; overflow:hidden; display:flex; flex-direction:column; }

  /* TOPBAR */
  #topbar { height:44px; background:var(--bg-1); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 16px; gap:14px; flex-shrink:0; }
  .logo { font-family:var(--font-mono); font-size:13px; font-weight:600; color:var(--accent); letter-spacing:0.05em; }
  .sep { width:1px; height:20px; background:var(--border); flex-shrink:0; }
  .pill { display:flex; align-items:center; gap:5px; font-family:var(--font-mono); font-size:10px; color:var(--text-2); }
  .dot { width:7px; height:7px; border-radius:50%; background:var(--green); box-shadow:0 0 5px var(--green); }
  .badge { font-size:10px; font-family:var(--font-mono); padding:3px 8px; border-radius:4px; font-weight:500; }
  .badge-pre    { background:var(--amber-bg); color:var(--amber); border:1px solid rgba(210,153,34,0.3); }
  .badge-open   { background:var(--green-bg); color:var(--green); border:1px solid rgba(63,185,80,0.3); }
  .badge-closed { background:var(--bg-3); color:var(--text-2); border:1px solid var(--border); }
  #clock { font-family:var(--font-mono); font-size:12px; color:var(--text-1); font-weight:500; margin-left:auto; }

  /* LAYOUT */
  #main { display:flex; flex:1; overflow:hidden; }

  /* LEFT */
  #left { width:195px; flex-shrink:0; background:var(--bg-1); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow-y:auto; }
  .ph { padding:7px 12px; font-size:9px; font-family:var(--font-mono); color:var(--text-3); letter-spacing:0.12em; text-transform:uppercase; border-bottom:1px solid var(--border); }

  /* WATCHLIST — TradingView Market Overview widget */
  #wl-widget { flex-shrink:0; }

  /* Asset selector buttons */
  #asset-btns { padding:6px 10px; display:flex; flex-wrap:wrap; gap:3px; border-bottom:1px solid var(--border); flex-shrink:0; }
  .abtn { font-family:var(--font-mono); font-size:9px; padding:3px 7px; border-radius:3px; border:1px solid var(--border); background:transparent; color:var(--text-2); cursor:pointer; transition:all 0.12s; }
  .abtn:hover { background:var(--bg-3); color:var(--text-1); }
  .abtn.active { background:var(--accent); border-color:var(--accent); color:#fff; }

  /* VIX */
  .vix-wrap { padding:9px 12px; border-bottom:1px solid var(--border); }
  .vix-val  { font-family:var(--font-mono); font-size:20px; font-weight:600; line-height:1; margin-bottom:3px; }
  .vix-lbl  { font-size:9px; color:var(--text-2); margin-bottom:7px; }
  .vix-bar  { height:3px; background:var(--bg-3); border-radius:2px; margin-bottom:6px; overflow:hidden; }
  .vix-fill { height:100%; border-radius:2px; }
  .vix-msg  { font-size:10px; line-height:1.4; padding:5px 7px; border-radius:4px; font-family:var(--font-mono); }
  .vg .vix-val{color:var(--green)} .vg .vix-fill{background:var(--green);width:28%} .vg .vix-msg{background:var(--green-bg);color:var(--green)}
  .vo .vix-val{color:var(--amber)} .vo .vix-fill{background:var(--amber);width:58%} .vo .vix-msg{background:var(--amber-bg);color:var(--amber)}
  .vr .vix-val{color:var(--red)}   .vr .vix-fill{background:var(--red);width:90%}   .vr .vix-msg{background:var(--red-bg);color:var(--red)}

  /* CORRELATION */
  .matrix { padding:6px 12px 4px; display:grid; grid-template-columns:repeat(4,1fr); gap:3px; }
  .mc { aspect-ratio:1; border-radius:4px; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .mc-s { font-family:var(--font-mono); font-size:7px; font-weight:600; line-height:1; }
  .mc-v { font-family:var(--font-mono); font-size:8px; line-height:1.3; }
  .csu{background:rgba(63,185,80,0.28)} .csu .mc-s,.csu .mc-v{color:var(--green)}
  .cu {background:rgba(63,185,80,0.13)} .cu  .mc-s,.cu  .mc-v{color:#56d364}
  .cn {background:rgba(139,148,158,0.1)}.cn  .mc-s,.cn  .mc-v{color:var(--text-2)}
  .cd {background:rgba(248,81,73,0.13)} .cd  .mc-s,.cd  .mc-v{color:#ff7b72}
  .csd{background:rgba(248,81,73,0.28)} .csd .mc-s,.csd .mc-v{color:var(--red)}
  .mleg { padding:2px 12px 8px; display:flex; gap:8px; border-bottom:1px solid var(--border); }
  .ml { display:flex; align-items:center; gap:3px; font-size:9px; color:var(--text-3); }
  .mld { width:6px; height:6px; border-radius:50%; }

  /* CENTER */
  #center { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }
  .chart-hdr { padding:7px 14px; background:var(--bg-1); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; flex-shrink:0; }
  .csym  { font-family:var(--font-mono); font-size:15px; font-weight:600; }
  .tf-btn { font-family:var(--font-mono); font-size:10px; padding:3px 7px; border-radius:4px; border:1px solid var(--border); background:transparent; color:var(--text-2); cursor:pointer; transition:all 0.12s; }
  .tf-btn:hover  { background:var(--bg-3); color:var(--text-1); }
  .tf-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; }
  .tf-grp { display:flex; gap:3px; margin-left:auto; }
  #chart-wrap { flex:1; position:relative; min-height:0; overflow:hidden; }
  #chart-wrap .tradingview-widget-container { position:absolute; inset:0; width:100% !important; height:100% !important; }
  #chart-wrap .tradingview-widget-container__widget { width:100% !important; height:100% !important; }

  /* RIGHT */
  #right { width:295px; flex-shrink:0; background:var(--bg-1); border-left:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
  .pm-grid { padding:5px 12px 8px; display:flex; flex-direction:column; gap:3px; }
  .pm-item { display:flex; align-items:center; gap:7px; padding:4px 7px; border-radius:4px; background:var(--bg-2); border:1px solid var(--border); }
  .pm-tick { font-family:var(--font-mono); font-size:10px; font-weight:600; color:var(--text-1); width:34px; }
  .pm-name { font-size:10px; color:var(--text-3); flex:1; }
  .pm-chg  { font-family:var(--font-mono); font-size:10px; font-weight:600; }
  .up{color:var(--green)} .down{color:var(--red)} .flat{color:var(--amber)}

  .fj-row { padding:6px 12px; border-bottom:1px solid var(--border); }
  .fj-btn { width:100%; display:flex; align-items:center; justify-content:center; gap:6px; padding:7px 0; border-radius:5px; border:1px solid rgba(31,111,235,0.4); background:var(--accent-glow); color:#58a6ff; font-family:var(--font-mono); font-size:10px; font-weight:600; cursor:pointer; text-decoration:none; transition:all 0.15s; }
  .fj-btn:hover { background:rgba(31,111,235,0.25); border-color:var(--accent); }
  .fj-dot { width:6px; height:6px; border-radius:50%; background:var(--green); box-shadow:0 0 5px var(--green); }

  .tabs { flex:1; display:flex; flex-direction:column; overflow:hidden; min-height:0; }
  .tab-bar { display:flex; border-bottom:1px solid var(--border); flex-shrink:0; }
  .tab-btn { flex:1; padding:7px 0; font-size:10px; font-family:var(--font-mono); color:var(--text-3); cursor:pointer; text-align:center; border:none; background:transparent; border-bottom:2px solid transparent; transition:all 0.12s; }
  .tab-btn:hover  { color:var(--text-2); background:var(--bg-2); }
  .tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); }
  .tab-pane { flex:1; overflow:hidden; display:none; flex-direction:column; min-height:0; }
  .tab-pane.active { display:flex; }
  .tab-pane iframe { width:100%; flex:1; border:none; min-height:0; }

  /* RSS */
  .rss-hdr { padding:5px 12px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); flex-shrink:0; }
  .rss-lbl { font-size:9px; font-family:var(--font-mono); color:var(--text-3); }
  .rss-rbtn { font-size:9px; font-family:var(--font-mono); color:var(--text-3); background:transparent; border:none; cursor:pointer; padding:2px 6px; border-radius:3px; }
  .rss-rbtn:hover { background:var(--bg-3); color:var(--text-2); }
  #rss-feed { flex:1; overflow-y:auto; }
  .ri { padding:8px 12px; border-bottom:1px solid var(--border); text-decoration:none; display:block; transition:background 0.12s; }
  .ri:hover { background:var(--bg-2); }
  .ri-meta { font-family:var(--font-mono); font-size:9px; color:var(--text-3); margin-bottom:3px; display:flex; align-items:center; gap:5px; }
  .ri-src { font-size:9px; padding:1px 5px; border-radius:3px; background:var(--accent-glow); color:#58a6ff; font-family:var(--font-mono); }
  .ri-title { font-size:11px; color:var(--text-1); line-height:1.4; }
  .rss-spin { padding:16px 12px; font-size:11px; color:var(--text-3); font-family:var(--font-mono); display:flex; align-items:center; gap:8px; }
  .spin { width:10px; height:10px; border:2px solid var(--bg-4); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }

  /* TICKER */
  #ticker { height:26px; background:var(--bg-1); border-top:1px solid var(--border); display:flex; align-items:center; overflow:hidden; flex-shrink:0; }
  .tk-track { overflow:hidden; flex:1; }
  .tk-scroll { display:flex; gap:28px; animation:tk 60s linear infinite; white-space:nowrap; width:max-content; }
  .tk-item { display:flex; align-items:center; gap:7px; font-family:var(--font-mono); font-size:10px; }
  .tk-sym { color:var(--text-2); }
  @keyframes tk { from{transform:translateX(0)} to{transform:translateX(-50%)} }
  ::-webkit-scrollbar{width:3px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:var(--bg-4);border-radius:2px}
</style>
</head>
<body>

<!-- TOPBAR -->
<div id="topbar">
  <div class="logo">⬡ TRADE·DESK</div>
  <div class="sep"></div>
  <div class="pill"><div class="dot"></div>TradingView</div>
  <div class="sep"></div>
  <div class="pill"><div class="dot"></div>Investing.com</div>
  <div class="sep"></div>
  <div class="badge badge-open" id="session">—</div>
  <div id="clock">—</div>
</div>

<div id="main">

  <!-- LEFT PANEL -->
  <div id="left">

    <!-- Watchlist live — TradingView Market Overview -->
    <div class="ph">Watchlist · Live</div>
    <div id="wl-widget">
      <div class="tradingview-widget-container">
        <div class="tradingview-widget-container__widget"></div>
        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" async>
        {
          "colorTheme": "dark",
          "dateRange": "1D",
          "showChart": false,
          "locale": "fr",
          "isTransparent": true,
          "showSymbolLogo": false,
          "showFloatingTooltip": false,
          "width": "100%",
          "height": "290",
          "tabs": [{
            "title": "Marchés",
            "symbols": [
              {"s":"CAPITALCOM:US100","d":"NQ"},
              {"s":"CAPITALCOM:US500","d":"SP500"},
              {"s":"CAPITALCOM:US30","d":"DJ"},
              {"s":"OANDA:XAUUSD","d":"GOLD"},
              {"s":"OANDA:EURUSD","d":"EURUSD"},
              {"s":"OANDA:GBPUSD","d":"GBPUSD"},
              {"s":"OANDA:WTICOUSD","d":"WTI"},
              {"s":"TVC:DXY","d":"DXY"}
            ],
            "originalTitle": "Indices"
          }]
        }
        </script>
      </div>
    </div>

    <!-- Asset selector -->
    <div id="asset-btns"></div>

    <!-- VIX -->
    <div class="ph" style="margin-top:0">Volatilité · VIX</div>
    <div class="vix-wrap vo" id="vix-wrap">
      <div class="vix-val">16.8</div>
      <div class="vix-lbl">Indice VIX · S&P 500</div>
      <div class="vix-bar"><div class="vix-fill"></div></div>
      <div class="vix-msg">⚠ Volatilité modérée. Surveille tes stops.</div>
    </div>

    <!-- Correlation -->
    <div class="ph">Corrélations</div>
    <div class="matrix" id="matrix"></div>
    <div class="mleg">
      <div class="ml"><div class="mld" style="background:var(--green)"></div>Haussier</div>
      <div class="ml"><div class="mld" style="background:var(--text-3)"></div>Neutre</div>
      <div class="ml"><div class="mld" style="background:var(--red)"></div>Baissier</div>
    </div>

  </div>

  <!-- CENTER -->
  <div id="center">
    <div class="chart-hdr">
      <div class="csym" id="csym">NQ — Nasdaq 100</div>
      <div class="tf-grp">
        <button class="tf-btn active" onclick="setTF('1',this)">1m</button>
        <button class="tf-btn" onclick="setTF('5',this)">5m</button>
        <button class="tf-btn" onclick="setTF('15',this)">15m</button>
        <button class="tf-btn" onclick="setTF('60',this)">1h</button>
        <button class="tf-btn" onclick="setTF('D',this)">1j</button>
      </div>
    </div>
    <div id="chart-wrap">
      <div class="tradingview-widget-container" id="chart-container" style="width:100%;height:100%">
        <div class="tradingview-widget-container__widget" style="width:100%;height:100%"></div>
      </div>
    </div>
  </div>

  <!-- RIGHT -->
  <div id="right">

    <div class="ph">Pré-market · Mag 7</div>
    <div class="pm-grid" id="pm"></div>

    <div class="fj-row">
      <a class="fj-btn" href="https://www.financialjuice.com" target="_blank">
        <div class="fj-dot"></div>FINANCIAL JUICE — LIVE
      </a>
    </div>

    <div class="tabs">
      <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('news',this)">📰 News</button>
        <button class="tab-btn" onclick="switchTab('cal',this)">🗓 Calendrier</button>
      </div>
      <div class="tab-pane active" id="tab-news">
        <div class="rss-hdr">
          <span class="rss-lbl" id="rss-lbl">Chargement...</span>
          <button class="rss-rbtn" onclick="fetchRSS()">↻</button>
        </div>
        <div id="rss-feed"><div class="rss-spin"><div class="spin"></div>Récupération...</div></div>
      </div>
      <div class="tab-pane" id="tab-cal">
        <iframe src="https://sslecal2.investing.com?columns=exc_flags,exc_currency,exc_importance,exc_actual,exc_forecast,exc_previous&features=datepicker,timezone&countries=5,22,6,4,32&calType=day&timeZone=55&lang=4" allowtransparency="true" scrolling="yes"></iframe>
      </div>
    </div>
  </div>
</div>

<!-- TICKER -->
<div id="ticker">
  <div class="tk-track"><div class="tk-scroll" id="tk-scroll"></div></div>
</div>

<script>
// ─── DATA ─────────────────────────────────────────────────
const ASSETS = [
  { sym:'NQ',     name:'Nasdaq 100',   tv:'CAPITALCOM:US100',  },
  { sym:'SP500',  name:'S&P 500',      tv:'CAPITALCOM:US500',  },
  { sym:'DJ',     name:'Dow Jones',    tv:'CAPITALCOM:US30',   },
  { sym:'GOLD',   name:'Or',           tv:'OANDA:XAUUSD',      },
  { sym:'EURUSD', name:'EUR/USD',      tv:'OANDA:EURUSD',      },
  { sym:'GBPUSD', name:'GBP/USD',      tv:'OANDA:GBPUSD',      },
  { sym:'WTI',    name:'Pétrole WTI',  tv:'OANDA:WTICOUSD',    },
  { sym:'DXY',    name:'Dollar Index', tv:'TVC:DXY',           },
];

const MAG7 = [
  {t:'NVDA',n:'Nvidia',c:+2.4},{t:'AAPL',n:'Apple',c:-0.3},
  {t:'MSFT',n:'Microsoft',c:+0.8},{t:'GOOGL',n:'Alphabet',c:+0.5},
  {t:'AMZN',n:'Amazon',c:+1.1},{t:'META',n:'Meta',c:-0.6},{t:'TSLA',n:'Tesla',c:+3.2},
];

const CORR = [
  {s:'NQ',v:+0.42,c:'csu'},{s:'SP500',v:+0.18,c:'cu'},{s:'DJ',v:-0.07,c:'cn'},{s:'GOLD',v:+0.31,c:'cu'},
  {s:'DXY',v:-0.54,c:'cd'},{s:'US10Y',v:-0.21,c:'cd'},{s:'WTI',v:+0.14,c:'cu'},{s:'GBP/USD',v:-0.09,c:'cn'},
];

let activeIdx = 0;
let currentTF = '1';

// ─── CLOCK ────────────────────────────────────────────────
function updateClock() {
  const now=new Date(), p=n=>String(n).padStart(2,'0');
  document.getElementById('clock').textContent =
    `${p(now.getHours())}:${p(now.getMinutes())}:${p(now.getSeconds())}  ·  ${now.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'})}`;
  const h=now.getUTCHours(), el=document.getElementById('session');
  if (h>=13&&h<16)      { el.className='badge badge-pre';    el.textContent='PRÉ-MARCHÉ US'; }
  else if (h>=16&&h<22) { el.className='badge badge-open';   el.textContent='● US OUVERTE'; }
  else if (h>=7&&h<16)  { el.className='badge badge-open';   el.textContent='● EU OUVERTE'; }
  else                  { el.className='badge badge-closed'; el.textContent='MARCHÉS FERMÉS'; }
}
setInterval(updateClock,1000); updateClock();

// ─── ASSET BUTTONS ────────────────────────────────────────
function renderAssetBtns() {
  document.getElementById('asset-btns').innerHTML = ASSETS.map((a,i)=>
    `<button class="abtn${i===0?' active':''}" onclick="selectAsset(${i})">${a.sym}</button>`
  ).join('');
}

function selectAsset(idx) {
  activeIdx = idx;
  document.querySelectorAll('.abtn').forEach((b,i)=>{
    b.className = `abtn${i===idx?' active':''}`;
  });
  document.getElementById('csym').textContent = `${ASSETS[idx].sym} — ${ASSETS[idx].name}`;
  loadChart();
}

// ─── CHART ────────────────────────────────────────────────
function loadChart() {
  const a = ASSETS[activeIdx];
  const container = document.getElementById('chart-container');
  container.innerHTML = `<div class="tradingview-widget-container__widget" style="width:100%;height:100%"></div>`;

  const script = document.createElement('script');
  script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js';
  script.async = true;
  script.innerHTML = JSON.stringify({
    autosize: true,
    symbol: a.tv,
    interval: currentTF,
    timezone: 'Europe/Paris',
    theme: 'dark',
    style: '1',
    locale: 'fr',
    backgroundColor: 'rgba(8,11,15,1)',
    gridColor: 'rgba(255,255,255,0.04)',
    hide_top_toolbar: false,
    hide_legend: false,
    save_image: false,
    studies: ['RSI@tv-basicstudies','MACD@tv-basicstudies'],
    support_host: 'https://www.tradingview.com'
  });
  container.appendChild(script);
}

function setTF(tf, btn) {
  document.querySelectorAll('.tf-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentTF = tf;
  loadChart();
}

// ─── CORRELATION ──────────────────────────────────────────
function renderMatrix() {
  document.getElementById('matrix').innerHTML = CORR.map(c=>
    `<div class="mc ${c.c}"><span class="mc-s">${c.s}</span><span class="mc-v">${c.v>0?'+':''}${c.v}%</span></div>`
  ).join('');
}

// ─── PREMARKET ────────────────────────────────────────────
function renderPM() {
  document.getElementById('pm').innerHTML = MAG7.map(s=>{
    const cls=s.c>0?'up':'down', sign=s.c>0?'+':'';
    return `<div class="pm-item"><span class="pm-tick">${s.t}</span><span class="pm-name">${s.n}</span><span class="pm-chg ${cls}">${sign}${s.c}%</span></div>`;
  }).join('');
}

// ─── TABS ─────────────────────────────────────────────────
function switchTab(id, btn) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-'+id).classList.add('active');
}

// ─── NEWS FINNHUB ─────────────────────────────────────────
const FINNHUB_KEY = 'd8anif9r01qpujl2q2rgd8anif9r01qpujl2q2s0';

async function fetchRSS() {
  document.getElementById('rss-lbl').textContent = 'Mise à jour...';
  try {
    const res  = await fetch(`https://finnhub.io/api/v1/news?category=general&token=${FINNHUB_KEY}`);
    const data = await res.json();
    document.getElementById('rss-feed').innerHTML = data.slice(0, 25).map(item => {
      const ago  = timeAgo(new Date(item.datetime * 1000));
      const src  = item.source || 'News';
      return `<a class="ri" href="${item.url}" target="_blank">
        <div class="ri-meta"><span class="ri-src">${src}</span>${ago}</div>
        <div class="ri-title">${item.headline}</div>
      </a>`;
    }).join('');
    const now = new Date();
    document.getElementById('rss-lbl').textContent = `Mis à jour ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  } catch(e) {
    document.getElementById('rss-lbl').textContent = 'Erreur réseau';
    document.getElementById('rss-feed').innerHTML = `<div class="rss-spin">✕ Impossible de charger les news.</div>`;
  }
}

function timeAgo(date) {
  const d=Math.floor((Date.now()-date)/60000);
  return d<1?"à l'instant":d<60?`${d}m`:`${Math.floor(d/60)}h`;
}

function renderTicker() {
  const tickers = ['CAPITALCOM:US100','CAPITALCOM:US500','CAPITALCOM:US30','OANDA:XAUUSD','OANDA:EURUSD','OANDA:GBPUSD','OANDA:WTICOUSD','TVC:DXY'];
  const names   = ['NQ','SP500','DJ','GOLD','EUR/USD','GBP/USD','WTI','DXY'];
  const wrap = document.getElementById('tk-scroll');
  wrap.innerHTML = '';

  // TradingView Ticker Tape widget
  const container = document.createElement('div');
  container.className = 'tradingview-widget-container';
  container.style.cssText = 'width:100%;height:26px;';
  const inner = document.createElement('div');
  inner.className = 'tradingview-widget-container__widget';
  container.appendChild(inner);
  const script = document.createElement('script');
  script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js';
  script.async = true;
  script.innerHTML = JSON.stringify({
    symbols: tickers.map((s,i)=>({proName:s,title:names[i]})),
    showSymbolLogo: false,
    isTransparent: true,
    displayMode: 'compact',
    colorTheme: 'dark',
    locale: 'fr'
  });
  container.appendChild(script);
  document.getElementById('ticker').innerHTML = '';
  document.getElementById('ticker').appendChild(container);
}
